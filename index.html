<!DOCTYPE html>

<html lang="ja" data-theme="light"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT育成診断（簡易版）</title>
    <!-- Pico CSS for clean base styling -->
    <link rel="stylesheet" href="./index_files/pico.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    <link href="./index_files/css2" rel="stylesheet">

    <style>
      :root {
        --primary: #2c3e50;
        --primary-hover: #34495e;
        --background: #ffffff;
        --text: #333333;
        --border-radius: 8px;
      }

      body {
        background-color: var(--background);
        color: var(--text);
        font-family: 'Noto Sans JP', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      main {
        width: 100%;
        max-width: 600px;
        padding: 0;
        background: transparent;
      }

      /* Screen Management */
      .screen {
        display: none;
        animation: fadeIn 0.3s ease-in-out;
      }

      .screen.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Typography */
      h1,
      h2,
      h3 {
        color: var(--primary);
        text-align: center;
        font-weight: 700;
      }

      h1 {
        font-size: 1.75rem;
        margin-bottom: 0.5rem;
      }
      h2 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }
      p {
        text-align: center;
        margin-bottom: 2rem;
      }

      /* Start Screen */
      .subtitle {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 2rem;
        display: block;
        text-align: center;
      }

      /* Question Screen */
      .progress-container {
        margin-bottom: 2rem;
      }

      .progress-text {
        text-align: center;
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 0.5rem;
      }

      .progress-bar {
        height: 6px;
        background-color: #eee;
        border-radius: 3px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background-color: var(--primary);
        transition: width 0.3s ease;
      }

      .question-text {
        font-size: 1.25rem;
        font-weight: 700;
        line-height: 1.6;
        text-align: center;
        margin-bottom: 2.5rem;
        min-height: 3.2em; /* Prevent layout jump */
      }

      /* Buttons */
      .choice-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      button {
        background-color: var(--primary);
        border: none;
        padding: 1.2rem;
        font-size: 1rem;
        font-weight: 700;
        border-radius: var(--border-radius);
        transition:
          transform 0.1s,
          background-color 0.2s;
        cursor: pointer;
        width: 100%;
      }

      button:hover {
        background-color: var(--primary-hover);
      }

      button:active {
        transform: scale(0.98);
      }

      button.outline {
        background-color: transparent;
        border: 2px solid #ddd;
        color: #666;
        margin-top: 1.5rem;
      }

      button.outline:hover {
        background-color: #f5f5f5;
        color: #333;
        border-color: #ccc;
      }

      .choice-btn {
        text-align: left;
        padding-left: 2rem;
        position: relative;
      }

      /* Result Screen */
      .result-card {
        text-align: center;
        padding: 2rem;
        border: 1px solid #eee;
        border-radius: var(--border-radius);
        margin-bottom: 2rem;
        background-color: #f9f9f9;
      }

      .result-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
        display: block;
      }

      .result-title {
        font-size: 1.5rem;
        color: var(--primary);
        margin-bottom: 1rem;
        font-weight: 700;
      }

      .result-desc {
        font-size: 1rem;
        line-height: 1.6;
        text-align: left;
        margin-bottom: 1.5rem;
      }

      .score-box {
        background-color: #fff;
        padding: 1rem;
        border-radius: var(--border-radius);
        border: 1px solid #eee;
        margin-bottom: 1rem;
        font-weight: 700;
        color: var(--primary);
      }

      .note {
        font-size: 0.8rem;
        color: #888;
        margin-top: 1rem;
      }

      /* Utility */
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main>
      <!-- 1. Start Screen -->
      <div id="start-screen" class="screen active">
        <h1>OJT育成診断（簡易版）</h1>
        <span class="subtitle">全8問・所要時間約2分</span>
        <p>
          あなたの職場のOJT体制について診断します。<br>
          8つの質問に答えると、即座に診断結果（4タイプ）が表示されます。
        </p>
        <button onclick="startDiagnosis()">診断を開始する</button>
      </div>

      <!-- 2. Question Screen -->
      <div id="question-screen" class="screen">
        <div class="progress-container">
          <div class="progress-text">質問 <span id="current-q-num">1</span> / 8</div>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 12.5%"></div>
          </div>
        </div>

        <div id="question-text" class="question-text">
          <!-- Question text injected here -->
        </div>

        <div class="choice-container">
          <button class="choice-btn" onclick="selectAnswer(3)">✅　はい</button>
          <button class="choice-btn" onclick="selectAnswer(1)">🤔　どちらとも言えない</button>
          <button class="choice-btn" onclick="selectAnswer(0)">❌　いいえ</button>
        </div>

        <button id="back-btn" class="outline hidden" onclick="goBack()">戻る</button>
      </div>

      <!-- 3. Result Screen -->
      <div id="result-screen" class="screen">
        <h2>診断結果</h2>

        <div class="result-card">
          <span id="result-icon" class="result-icon">🏆</span>
          <div id="result-title" class="result-title">再現性確立型</div>

          <div class="score-box">
            仕組みスコア: <span id="mech-score">0</span>/12 &nbsp;|&nbsp; スキルスコア:
            <span id="skill-score">0</span>/12
          </div>

          <div id="result-desc" class="result-desc">
            仕組みもスキルも高い理想的な状態です。この体制を維持し、さらに洗練させていきましょう。
          </div>
        </div>

        <button onclick="restartDiagnosis()">もう一度診断する</button>
      </div>
    </main>

    <script>
      // Configuration: Google Apps Script Web App URL
      const GAS_URL =
        'https://script.google.com/macros/s/AKfycbztdnqNY4hxdNKaOLmEBZQOrqlv9G2d4LsPt4_217ofYJsYkYk4p2U1ei-mUg0IgTJf/exec';

      // Questions Data
      const questions = [
        // Part 1: Mechanism (Q1-Q4)
        'OJTの目標や育成計画が明確に定義されている',
        '育成の進捗を定期的に確認する仕組みがある',
        'トレーナーが指導に集中できる時間・環境が確保されている',
        '育成に関するマニュアルやツールが整備されている',
        // Part 2: Skill (Q5-Q8)
        '分かりやすく教える技術（ティーチング）がある',
        '相手の習熟度に応じて指導方法を調整できる',
        '適切なフィードバックができる',
        '若手が質問しやすい雰囲気を作れている',
      ];

      // State
      let currentQuestionIndex = 0;
      let answers = []; // Stores scores: 3, 1, or 0

      // DOM Elements
      const startScreen = document.getElementById('start-screen');
      const questionScreen = document.getElementById('question-screen');
      const resultScreen = document.getElementById('result-screen');

      const currentQNumEl = document.getElementById('current-q-num');
      const progressFillEl = document.getElementById('progress-fill');
      const questionTextEl = document.getElementById('question-text');
      const backBtnEl = document.getElementById('back-btn');

      const resultIconEl = document.getElementById('result-icon');
      const resultTitleEl = document.getElementById('result-title');
      const resultDescEl = document.getElementById('result-desc');
      const mechScoreEl = document.getElementById('mech-score');
      const skillScoreEl = document.getElementById('skill-score');

      // Functions
      function showScreen(screen) {
        document.querySelectorAll('.screen').forEach((s) => s.classList.remove('active'));
        screen.classList.add('active');
      }

      function startDiagnosis() {
        currentQuestionIndex = 0;
        answers = [];
        showQuestion();
        showScreen(questionScreen);
      }

      function showQuestion() {
        // Update UI
        currentQNumEl.textContent = currentQuestionIndex + 1;
        progressFillEl.style.width = `${((currentQuestionIndex + 1) / 8) * 100}%`;
        questionTextEl.textContent = questions[currentQuestionIndex];

        // Back button visibility
        if (currentQuestionIndex > 0) {
          backBtnEl.classList.remove('hidden');
        } else {
          backBtnEl.classList.add('hidden');
        }
      }

      function selectAnswer(score) {
        answers[currentQuestionIndex] = score;

        if (currentQuestionIndex < 7) {
          currentQuestionIndex++;
          showQuestion();
        } else {
          showResult();
        }
      }

      function goBack() {
        if (currentQuestionIndex > 0) {
          currentQuestionIndex--;
          showQuestion();
        }
      }

      function calculateScores() {
        // Mechanism: Q1-Q4 (Indices 0-3)
        let mechScore = 0;
        for (let i = 0; i < 4; i++) mechScore += answers[i];

        // Skill: Q5-Q8 (Indices 4-7)
        let skillScore = 0;
        for (let i = 4; i < 8; i++) skillScore += answers[i];

        return { mechScore, skillScore };
      }

      function determineType(mech, skill) {
        if (mech >= 8 && skill >= 8) {
          return {
            type: '再現性確立型',
            icon: '🏆',
            desc: '仕組みもスキルも高い理想的な状態です。この体制を維持し、さらに洗練させていきましょう。',
          };
        } else if (mech < 8 && skill >= 8) {
          return {
            type: '現場努力型',
            icon: '💪',
            desc: '個人のスキルは高いですが、組織の仕組みが追いついていません。仕組みの整備を優先しましょう。',
          };
        } else if (mech >= 8 && skill < 8) {
          return {
            type: 'お飾りルール型',
            icon: '📋',
            desc: '仕組みはありますが、現場のスキルが伴っていません。トレーナーのスキル強化を優先しましょう。',
          };
        } else {
          return {
            type: '育成不全リスク型',
            icon: '⚠️',
            desc: '仕組みもスキルも不足しています。早急な改善が必要です。まずは仕組みの整備から始めましょう。',
          };
        }
      }

      function showResult() {
        const { mechScore, skillScore } = calculateScores();
        const result = determineType(mechScore, skillScore);

        // Update UI
        resultIconEl.textContent = result.icon;
        resultTitleEl.textContent = result.type;
        resultDescEl.textContent = result.desc;
        mechScoreEl.textContent = mechScore;
        skillScoreEl.textContent = skillScore;

        showScreen(resultScreen);

        // Send data to Google Sheets (Async)
        sendToGoogleSheets(mechScore, skillScore, result.type);
      }

      function sendToGoogleSheets(mechScore, skillScore, resultType) {
        if (!GAS_URL || GAS_URL.includes('PLACEHOLDER')) {
          console.warn('GAS URL not configured');
          return;
        }

        const data = {
          timestamp: new Date().toISOString(),
          answers: answers.join(','),
          mechScore: mechScore,
          skillScore: skillScore,
          resultType: resultType,
        };

        console.log('Sending data to Google Sheets:', data);

        // Send POST request using URLSearchParams for form-data format
        const formData = new URLSearchParams();
        formData.append('timestamp', data.timestamp);
        formData.append('answers', data.answers);
        formData.append('mechScore', data.mechScore);
        formData.append('skillScore', data.skillScore);
        formData.append('resultType', data.resultType);

        fetch(GAS_URL, {
          method: 'POST',
          body: formData,
        })
          .then((response) => {
            console.log('Response received:', response);
            return response.text();
          })
          .then((text) => {
            console.log('Data sent successfully:', text);
          })
          .catch((err) => {
            console.error('Error sending data:', err);
          });
      }

      function restartDiagnosis() {
        startDiagnosis();
      }
    </script>
